{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block heading %}Ingresar{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body p-4">
        <h4 class="text-center mb-4"><i class="bi bi-grid-3x3-gap-fill me-1" style="color:var(--accent)"></i> SmartPost Hub</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100"><i class="bi bi-lock me-1"></i> Ingresar</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('landing') }}" class="text-muted small"><i class="bi bi-arrow-left"></i> Volver a la landing</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
