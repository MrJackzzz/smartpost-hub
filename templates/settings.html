{% extends "base.html" %}
{% block title %}Configuración{% endblock %}
{% block heading %}Configuración{% endblock %}
{% block content %}

<div class="card border-0 shadow-sm rounded-3 mb-4">
  <div class="card-body">
    <h6 class="fw-bold mb-3"><i class="bi bi-key me-1"></i> Cambiar contraseña</h6>
    <form method="post" action="{{ url_for('settings') }}" class="row g-3">
      <input type="hidden" name="action" value="change_password">
      <div class="col-md-4"><label class="form-label">Contraseña actual</label><input type="password" name="current_password" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Nueva contraseña</label><input type="password" name="new_password" class="form-control" required minlength="6"></div>
      <div class="col-md-4"><label class="form-label">Confirmar</label><input type="password" name="confirm_password" class="form-control" required></div>
      <div class="col-12"><button type="submit" class="btn btn-primary">Cambiar contraseña</button></div>
    </form>
  </div>
</div>

<div class="card border-0 shadow-sm rounded-3">
  <div class="card-body">
    <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-1"></i> Información del Hub</h6>
    <table class="table table-sm">
      <tr><td>Versión</td><td>1.0.0</td></tr>
      <tr><td>Admin</td><td>{{ current_user.username }}</td></tr>
      <tr><td>Email</td><td>{{ current_user.email }}</td></tr>
    </table>
  </div>
</div>
{% endblock %}
