services:
  - type: web
    name: smartpost-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartpost-hub-db
          property: connectionString

databases:
  - name: smartpost-hub-db
    databaseName: hub
    plan: free
